# Server Configuration
server:
  port: 8080 # 서버 포트 설정 (기본 값 : 8080)

spring:
  application:
    name: session2 # 이 서비스 이름이 무엇인지 적는 곳 != 패키지 이름 (꼭 session이 아니어도 됨)

    #Database Configuration (내 컴퓨터 3306번에 있는 mydb에 연결해라)
    #datasource:
    # url: jdbc:mysql://localhost:3306/mydb # DB 연결 주소 (jdbc:자바 DB 연결 규칙, 3306:MySQL 기본 포트, mydb:DB 이름)
    #username: root #DB 사용자명
    #password: yourpassword #DB 비밀번호 (사용자명, 비밀번호는 깃허브에 올리면 안됨)
    #driver-class-name: com.mysql.cj.jdbc.Driver
  #JPA Configuration
  jpa: # 자바 객체와 DB 테이블 자동 매핑 기술
    hibernate:
      ddl-auto: update # 테이블 자동 생성/수정 (create, update, none, validate 가능)
    show-sql: true # 실행되는 SQL 쿼리 로그 출력
    database-platform: org.hibernate.dialect.MySQLDialect